<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title> PIEDRA, PAPEL O TIJERA</title>
        <script>
            //1 es piedra, 2 es papel, 3 es tijera
            let jugador = 0
            let pc = 0
            jugador = prompt ("Elije 1 para piedra, 2 para papel, 3 para tijeras")
            alert("Elegiste " + jugador)
            if (jugador == 1) {
                alert ("Elegiste piedra")
            } else if (jugador == 2) {
                alert ("Elegiste papel")
            } else if (jugador == 3) {
                alert ("Elegiste tijera")
            } else if {
                alert ("Perdiste")
            }
                if (pc == 1) {
                alert ("Pc elige piedra")
            } else if (pc == 2) {
                alert ("Pc elige papel")
            } else if (pc == 3) {
                alert ("Pc elige tijera")
            } else if {
                alert ("Perdiste")
            }
            //INICIA LA COMPARACION ENTRE POSIBILIDADES
            if(pc==jugador) {
                alert ("Empate")
            } else if (jugador == 1 && pc == 3){
                alert ("GANASTE")
            } else if (jugador == 2 && pc == 1){
                alert ("GANASTE")
            } else if (jugador == 3 && pc == 2){
                alert ("GANASTE")
            } else {
                alert ("PERDISTE")
            }

        </script>
    </head>
    <body>
        <h1> Piedra, papel o tijera</h1>
    </body>
</html>
